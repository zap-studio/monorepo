name: Setup Node and pnpm
description: Setup Node.js with pnpm cache, install pnpm, and install dependencies.

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "lts/*"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        package_json_file: package.json
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
