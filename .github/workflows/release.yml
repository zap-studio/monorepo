name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release for tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          is_changesets_tag() {
            [[ "$1" =~ ^(@[^/]+/[^@]+|[^@]+)@[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]
          }

          create_release() {
            local tag_name="$1"

            if ! is_changesets_tag "$tag_name"; then
              echo "Skipping non-Changesets tag: $tag_name"
              return 0
            fi

            local version
            version="${tag_name##*@}"

            if [[ "$version" == *-* ]]; then
              gh release create "$tag_name" --title "$tag_name" --generate-notes --prerelease
            else
              gh release create "$tag_name" --title "$tag_name" --generate-notes
            fi
          }

          create_release_if_missing() {
            local tag_name="$1"

            if ! is_changesets_tag "$tag_name"; then
              echo "Skipping non-Changesets tag: $tag_name"
              return 0
            fi

            if gh release view "$tag_name" >/dev/null 2>&1; then
              echo "Release already exists for tag: $tag_name"
              return 0
            fi

            create_release "$tag_name"
          }

          create_release_if_missing "$TAG_NAME"
