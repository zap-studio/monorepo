name: Coverage

on:
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "apps/docs/content/**"
      - ".changeset/**"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-coverage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  coverage-monorepo:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build monorepo
        run: vp run -r build

      - name: Run coverage
        run: vp run test:coverage

      - name: Collect JUnit files
        if: ${{ always() }}
        id: junit
        run: |
          files="$(find packages -path '*/coverage/junit.xml' -type f | sort | paste -sd, -)"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Upload test results to Codecov
        if: ${{ always() && steps.junit.outputs.files != '' }}
        uses: codecov/test-results-action@v5
        with:
          files: ${{ steps.junit.outputs.files }}
          fail_ci_if_error: false
          use_oidc: true
          verbose: true

      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/report/lcov.info
          fail_ci_if_error: false
          use_oidc: true
          verbose: true
