name: CI

on:
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_FILTER: ./packages/*

jobs:
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build packages
        run: vp run --filter "$PACKAGE_FILTER" build

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build docs
        run: vp run docs#build

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build packages
        run: vp run --filter "$PACKAGE_FILTER" build

      - name: Run check on the monorepo
        run: vp check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build packages
        run: vp run --filter "$PACKAGE_FILTER" build

      - name: Run tests
        run: vp test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build packages
        run: vp run --filter "$PACKAGE_FILTER" build

      - name: Run coverage
        run: CI=1 vp test run --coverage

      - name: Upload test results to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          files: ./coverage/junit.xml
          fail_ci_if_error: false
          report_type: test_results
          use_oidc: true
          verbose: true

      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          use_oidc: true
          verbose: true

  publish-check:
    name: Publish Check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build packages
        run: vp run --filter "$PACKAGE_FILTER" build

      - name: Run publish checks
        run: vp run --filter "$PACKAGE_FILTER" prepublishOnly
