name: CI

on:
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - ".changeset/**"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      packages: ${{ steps.filter.outputs.packages }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed workspaces
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - "apps/docs/**"
            packages:
              - "packages/**"
            shared:
              - ".github/actions/setup-vp/**"
              - ".github/workflows/ci.yml"
              - ".npmrc"
              - "configs/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "vite.config.ts"

  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: changes
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.shared == 'true')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build packages
        run: vp run --filter ./packages/* build

      - name: Upload package build outputs
        uses: actions/upload-artifact@v4
        with:
          name: package-build-outputs
          path: |
            packages/*/dist
          if-no-files-found: error

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: changes
    if: >
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.shared == 'true')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Build docs
        run: vp run docs#build

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: changes
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.packages == 'true' ||
      needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Run check on the monorepo
        run: vp check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.packages == 'true' ||
      needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Run tests
        run: vp test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: changes
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.packages == 'true' ||
      needs.changes.outputs.shared == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Run coverage
        run: CI=1 vp test run --coverage

      - name: Upload test results to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          files: ./coverage/junit.xml
          fail_ci_if_error: false
          report_type: test_results
          use_oidc: true
          verbose: true

      - name: Upload coverage to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          use_oidc: true
          verbose: true

  publish-check:
    name: Publish Check
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-packages
    if: >
      github.event_name != 'pull_request' ||
      needs.changes.outputs.packages == 'true' ||
      needs.changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: package-build-outputs
          path: .

      - name: Run publish checks
        run: vp run --filter ./packages/* prepublishOnly
