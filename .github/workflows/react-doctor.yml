name: React Doctor

on:
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/docs/**"
      - "scripts/react-doctor.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/actions/setup-vp/**"
      - ".github/workflows/react-doctor.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor-docs:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp

      - name: Run React Doctor for docs
        continue-on-error: true
        run: vp run docs#react-doctor

      - name: Publish React Doctor summary
        if: ${{ always() }}
        run: |
          {
            echo "## React Doctor"
            echo ""
            if [ -f .react-doctor/docs/latest.txt ]; then
              cat .react-doctor/docs/latest.txt
            else
              echo "No React Doctor report was produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
