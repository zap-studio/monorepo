name: Notify Intent

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/*/src/**'
      - 'packages/*/skills/**'

permissions:
  contents: read

concurrency:
  group: intent-notify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    name: Notify TanStack Intent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Collect changed files
        id: changes
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Dispatch to intent repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INTENT_NOTIFY_TOKEN }}
          repository: TanStack/intent
          event-type: skill-check
          client-payload: |
            {
              "package": "@zap-studio/monorepo",
              "sha": "${{ github.sha }}",
              "changed_files": ${{ steps.changes.outputs.files }}
            }
