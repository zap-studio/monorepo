      - mistake: "Ignoring validation result branch"
        mechanism: "With throwOnValidationError=false, return type is result object and must be narrowed via issues/value."
        wrong_pattern: |
          const user = await $fetch('/users/1', UserSchema, { throwOnValidationError: false });
          console.log(user.id);
        correct_pattern: |
          const result = await $fetch('/users/1', UserSchema, {
            throwOnValidationError: false,
