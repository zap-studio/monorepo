  - name: "Permit policy authoring"
    slug: "zap-permit-policy-authoring"
    domain: "authorization-policy-evaluation"
    description: "Define resources/actions/rules for createPolicy and evaluate decisions with merge strategies."
    type: "core"
    packages:
      - "@zap-studio/permit"
    covers:
      - "createPolicy"
