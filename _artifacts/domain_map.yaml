      - "mergePolicies and mergePoliciesAny"
    tasks:
      - "Define typed authorization model"
      - "Write resource-level authorization rules"
      - "Combine multiple policy layers safely"
    failure_modes:
      - mistake: "Using action not listed in actions map"
        mechanism: "Policy.can returns false when action is missing in actions[resourceType], even if rules define a handler."
        wrong_pattern: |
          const allowed = await policy.can(ctx, 'publish', 'post', post);
        correct_pattern: |
          const actions = {
            post: ['read', 'write', 'publish'],
          } as const;
          const allowed = await policy.can(ctx, 'publish', 'post', post);
        source: "zap-studio/monorepo:packages/permit/src/index.ts"
        priority: "HIGH"
        status: "active"
        version_context: "Current behavior in v0.2.1."
      - mistake: "Assuming invalid resource still reaches rules"
        mechanism: "Resource validation failures short-circuit to deny and rule function is never executed."
        wrong_pattern: |
          await policy.can(ctx, 'write', 'post', { id: 123 });
        correct_pattern: |
          await policy.can(ctx, 'write', 'post', {
            id: '123',
            authorId: ctx.user.id,
          });
        source: "zap-studio/monorepo:packages/permit/src/index.ts"
        priority: "HIGH"
        status: "active"
        version_context: "Current behavior in v0.2.1."
      - mistake: "Expecting mergePoliciesAny to deny-overrides"
        mechanism: "mergePoliciesAny returns true as soon as any child policy allows."
        wrong_pattern: |
          const merged = mergePoliciesAny(basePolicy, restrictivePolicy);
          // expected restrictive policy to block access
        correct_pattern: |
          const merged = mergePolicies(basePolicy, restrictivePolicy);
          // deny-overrides: every policy must allow
        source: "zap-studio/monorepo:packages/permit/src/index.ts"
        priority: "MEDIUM"
        status: "active"
        version_context: "Current behavior in v0.2.1."
