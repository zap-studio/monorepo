          await api.post('/users', UserSchema, {
            body: new URLSearchParams({ name: 'Ada' }),
          });
        correct_pattern: |
          await api.post('/users', UserSchema, {
            body: { name: 'Ada' },
            headers: { 'Content-Type': 'application/json' },
