pre-commit:
  parallel: true
  jobs:
    - run: pnpm exec ultracite fix
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true

    - run: pnpm run typecheck
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"

commit-msg:
  commands:
    "lint commit message":
      run: pnpm exec commitlint --edit {1}
